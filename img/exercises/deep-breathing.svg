<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Chair seat -->
    <line x1="65" y1="130" x2="135" y2="130" stroke="#3a3a5a" stroke-width="3"/>
    <!-- Head -->
    <circle cx="100" cy="48" r="14"/>
    <!-- Neck -->
    <line x1="100" y1="62" x2="100" y2="70"/>
    <!-- Torso -->
    <line x1="100" y1="70" x2="100" y2="130"/>
    <!-- Arms resting on lap -->
    <line x1="100" y1="82" x2="75" y2="95"/>
    <line x1="75" y1="95" x2="78" y2="120"/>
    <line x1="100" y1="82" x2="125" y2="95"/>
    <line x1="125" y1="95" x2="122" y2="120"/>
    <!-- Legs -->
    <line x1="100" y1="130" x2="82" y2="165"/>
    <line x1="100" y1="130" x2="118" y2="165"/>
    <line x1="82" y1="165" x2="80" y2="190"/>
    <line x1="118" y1="165" x2="120" y2="190"/>
  </g>
  <!-- Breath in arrows (outward from chest) -->
  <path d="M 60 80 Q 50 85 55 95" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="50,92 55,100 59,91" fill="#4ecdc4"/>
  <path d="M 140 80 Q 150 85 145 95" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="141,91 145,100 150,92" fill="#4ecdc4"/>
  <!-- Breath out arrows (inward toward chest) -->
  <path d="M 55 110 Q 50 105 58 100" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4,3"/>
  <polygon points="56,96 63,98 58,104" fill="#4ecdc4" opacity="0.6"/>
  <path d="M 145 110 Q 150 105 142 100" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4,3"/>
  <polygon points="142,104 137,98 144,96" fill="#4ecdc4" opacity="0.6"/>
</svg>
