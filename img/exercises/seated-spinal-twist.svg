<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#3a3a5a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Chair seat -->
    <line x1="65" y1="130" x2="135" y2="130"/>
    <!-- Chair back -->
    <line x1="130" y1="90" x2="135" y2="130"/>
    <!-- Chair legs -->
    <line x1="70" y1="130" x2="65" y2="185"/>
    <line x1="130" y1="130" x2="135" y2="185"/>
  </g>
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head turned -->
    <circle cx="108" cy="60" r="14"/>
    <!-- Neck -->
    <line x1="104" y1="72" x2="100" y2="82"/>
    <!-- Torso with twist -->
    <line x1="100" y1="82" x2="100" y2="130"/>
    <!-- Arm reaching across to opposite knee -->
    <line x1="100" y1="95" x2="120" y2="110"/>
    <line x1="120" y1="110" x2="82" y2="140"/>
    <!-- Other arm reaching back -->
    <line x1="100" y1="95" x2="80" y2="105"/>
    <line x1="80" y1="105" x2="130" y2="115"/>
    <!-- Upper legs -->
    <line x1="100" y1="130" x2="80" y2="160"/>
    <line x1="100" y1="130" x2="120" y2="160"/>
    <!-- Lower legs -->
    <line x1="80" y1="160" x2="78" y2="185"/>
    <line x1="120" y1="160" x2="122" y2="185"/>
  </g>
  <!-- Curved twist arrow -->
  <path d="M 85 80 A 30 30 0 0 1 118 80" stroke="#4ecdc4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="118,75 118,85 126,80" fill="#4ecdc4"/>
</svg>
