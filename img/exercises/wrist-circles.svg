<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="100" cy="50" r="14"/>
    <!-- Neck -->
    <line x1="100" y1="64" x2="100" y2="72"/>
    <!-- Torso -->
    <line x1="100" y1="72" x2="100" y2="140"/>
    <!-- Shoulders -->
    <line x1="100" y1="82" x2="75" y2="85"/>
    <line x1="100" y1="82" x2="125" y2="85"/>
    <!-- Upper arms forward -->
    <line x1="75" y1="85" x2="60" y2="105"/>
    <line x1="125" y1="85" x2="140" y2="105"/>
    <!-- Forearms extended forward -->
    <line x1="60" y1="105" x2="48" y2="115"/>
    <line x1="140" y1="105" x2="152" y2="115"/>
    <!-- Hands -->
    <line x1="48" y1="115" x2="42" y2="118"/>
    <line x1="152" y1="115" x2="158" y2="118"/>
    <!-- Legs -->
    <line x1="100" y1="140" x2="85" y2="175"/>
    <line x1="100" y1="140" x2="115" y2="175"/>
    <line x1="85" y1="175" x2="83" y2="192"/>
    <line x1="115" y1="175" x2="117" y2="192"/>
  </g>
  <!-- Circular arrows at wrists -->
  <circle cx="48" cy="115" r="12" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="40,108 36,114 43,112" fill="#4ecdc4"/>
  <circle cx="152" cy="115" r="12" stroke="#4ecdc4" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="160,108 164,114 157,112" fill="#4ecdc4"/>
</svg>
