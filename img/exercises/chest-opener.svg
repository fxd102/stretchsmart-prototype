<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="100" cy="42" r="14"/>
    <!-- Neck -->
    <line x1="100" y1="56" x2="100" y2="65"/>
    <!-- Torso slightly forward -->
    <line x1="100" y1="65" x2="96" y2="120"/>
    <!-- Arms clasped behind back -->
    <line x1="100" y1="75" x2="118" y2="90"/>
    <line x1="118" y1="90" x2="120" y2="115"/>
    <line x1="100" y1="75" x2="118" y2="90"/>
    <line x1="100" y1="75" x2="82" y2="90"/>
    <line x1="82" y1="90" x2="80" y2="115"/>
    <!-- Hands clasped behind -->
    <line x1="80" y1="115" x2="120" y2="115"/>
    <!-- Legs -->
    <line x1="96" y1="120" x2="82" y2="165"/>
    <line x1="96" y1="120" x2="110" y2="165"/>
    <!-- Feet -->
    <line x1="82" y1="165" x2="75" y2="185"/>
    <line x1="110" y1="165" x2="117" y2="185"/>
    <!-- Ground -->
    <line x1="65" y1="185" x2="127" y2="185" stroke="#3a3a5a" stroke-width="2"/>
  </g>
  <!-- Arrow showing chest forward -->
  <line x1="88" y1="85" x2="70" y2="85" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="73,80 63,85 73,90" fill="#4ecdc4"/>
</svg>
