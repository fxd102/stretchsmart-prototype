<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="95" cy="35" r="14"/>
    <!-- Neck -->
    <line x1="95" y1="49" x2="95" y2="58"/>
    <!-- Torso upright -->
    <line x1="95" y1="58" x2="95" y2="110"/>
    <!-- Arms on front knee -->
    <line x1="95" y1="72" x2="78" y2="88"/>
    <line x1="78" y1="88" x2="70" y2="105"/>
    <line x1="95" y1="72" x2="112" y2="88"/>
    <line x1="112" y1="88" x2="105" y2="105"/>
    <!-- Front leg (lunge) — bent at knee -->
    <line x1="95" y1="110" x2="70" y2="140"/>
    <line x1="70" y1="140" x2="65" y2="180"/>
    <!-- Front foot -->
    <line x1="65" y1="180" x2="55" y2="183"/>
    <!-- Back leg — knee on ground -->
    <line x1="95" y1="110" x2="125" y2="140"/>
    <line x1="125" y1="140" x2="140" y2="160"/>
    <!-- Back knee on floor -->
    <circle cx="125" cy="140" r="3" fill="#e0e0e0"/>
    <!-- Back foot -->
    <line x1="140" y1="160" x2="148" y2="165"/>
  </g>
  <!-- Ground -->
  <line x1="45" y1="183" x2="155" y2="183" stroke="#3a3a5a" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow showing hip push forward -->
  <line x1="105" y1="110" x2="80" y2="110" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="83,105 73,110 83,115" fill="#4ecdc4"/>
</svg>
