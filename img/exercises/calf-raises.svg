<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="100" cy="32" r="14"/>
    <!-- Neck -->
    <line x1="100" y1="46" x2="100" y2="55"/>
    <!-- Torso -->
    <line x1="100" y1="55" x2="100" y2="115"/>
    <!-- Arms at sides -->
    <line x1="100" y1="68" x2="78" y2="78"/>
    <line x1="78" y1="78" x2="72" y2="105"/>
    <line x1="100" y1="68" x2="122" y2="78"/>
    <line x1="122" y1="78" x2="128" y2="105"/>
    <!-- Legs straight -->
    <line x1="100" y1="115" x2="88" y2="155"/>
    <line x1="100" y1="115" x2="112" y2="155"/>
    <!-- On tiptoes — angled feet -->
    <line x1="88" y1="155" x2="85" y2="170"/>
    <line x1="112" y1="155" x2="115" y2="170"/>
    <!-- Toe points -->
    <line x1="85" y1="170" x2="80" y2="175"/>
    <line x1="115" y1="170" x2="120" y2="175"/>
  </g>
  <!-- Ground -->
  <line x1="65" y1="175" x2="135" y2="175" stroke="#3a3a5a" stroke-width="2" stroke-linecap="round"/>
  <!-- Upward arrows at heels -->
  <line x1="80" y1="168" x2="80" y2="150" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="75,153 80,143 85,153" fill="#4ecdc4"/>
  <line x1="122" y1="168" x2="122" y2="150" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="117,153 122,143 127,153" fill="#4ecdc4"/>
</svg>
