<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Doorway frame -->
  <g stroke="#3a3a5a" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="55" y1="10" x2="55" y2="195"/>
    <line x1="145" y1="10" x2="145" y2="195"/>
    <line x1="55" y1="10" x2="145" y2="10"/>
  </g>
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="100" cy="42" r="13"/>
    <!-- Neck -->
    <line x1="100" y1="55" x2="100" y2="63"/>
    <!-- Torso stepping forward -->
    <line x1="100" y1="63" x2="98" y2="120"/>
    <!-- Arms on doorframe at 90 degrees -->
    <!-- Left arm -->
    <line x1="100" y1="75" x2="55" y2="75"/>
    <line x1="55" y1="75" x2="55" y2="45"/>
    <!-- Right arm -->
    <line x1="100" y1="75" x2="145" y2="75"/>
    <line x1="145" y1="75" x2="145" y2="45"/>
    <!-- Front leg stepping through -->
    <line x1="98" y1="120" x2="82" y2="160"/>
    <line x1="82" y1="160" x2="80" y2="190"/>
    <!-- Back leg -->
    <line x1="98" y1="120" x2="115" y2="160"/>
    <line x1="115" y1="160" x2="118" y2="190"/>
  </g>
  <!-- Arrow showing step forward -->
  <line x1="98" y1="140" x2="78" y2="140" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="81,135 71,140 81,145" fill="#4ecdc4"/>
</svg>
