<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wall -->
  <line x1="145" y1="10" x2="145" y2="195" stroke="#3a3a5a" stroke-width="4" stroke-linecap="round"/>
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head against wall -->
    <circle cx="115" cy="35" r="14"/>
    <!-- Neck -->
    <line x1="115" y1="49" x2="115" y2="58"/>
    <!-- Torso against wall -->
    <line x1="115" y1="58" x2="115" y2="120"/>
    <!-- Arms in goalpost position against wall -->
    <!-- Upper arms horizontal -->
    <line x1="115" y1="72" x2="140" y2="72"/>
    <line x1="115" y1="72" x2="90" y2="72"/>
    <!-- Forearms up (goalpost) -->
    <line x1="140" y1="72" x2="140" y2="42"/>
    <line x1="90" y1="72" x2="90" y2="42"/>
    <!-- Legs -->
    <line x1="115" y1="120" x2="105" y2="165"/>
    <line x1="115" y1="120" x2="125" y2="165"/>
    <!-- Feet -->
    <line x1="105" y1="165" x2="100" y2="185"/>
    <line x1="125" y1="165" x2="130" y2="185"/>
    <line x1="93" y1="185" x2="107" y2="185"/>
    <line x1="123" y1="185" x2="137" y2="185"/>
  </g>
  <!-- Vertical arrows at hands showing up/down slide -->
  <line x1="85" y1="45" x2="85" y2="28" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="80,31 85,21 90,31" fill="#4ecdc4"/>
  <line x1="85" y1="45" x2="85" y2="62" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="80,59 85,69 90,59" fill="#4ecdc4"/>
</svg>
