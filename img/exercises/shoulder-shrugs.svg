<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Chair seat -->
    <line x1="70" y1="140" x2="130" y2="140" stroke="#3a3a5a" stroke-width="3"/>
    <!-- Chair back -->
    <line x1="125" y1="100" x2="130" y2="140" stroke="#3a3a5a" stroke-width="3"/>
    <!-- Head -->
    <circle cx="100" cy="55" r="14"/>
    <!-- Neck -->
    <line x1="100" y1="69" x2="100" y2="78"/>
    <!-- Torso -->
    <line x1="100" y1="78" x2="100" y2="140"/>
    <!-- Shoulders raised -->
    <line x1="100" y1="78" x2="72" y2="72"/>
    <line x1="100" y1="78" x2="128" y2="72"/>
    <!-- Upper arms -->
    <line x1="72" y1="72" x2="68" y2="110"/>
    <line x1="128" y1="72" x2="132" y2="110"/>
    <!-- Forearms -->
    <line x1="68" y1="110" x2="80" y2="130"/>
    <line x1="132" y1="110" x2="120" y2="130"/>
    <!-- Upper legs -->
    <line x1="100" y1="140" x2="80" y2="170"/>
    <line x1="100" y1="140" x2="120" y2="170"/>
    <!-- Lower legs -->
    <line x1="80" y1="170" x2="78" y2="190"/>
    <line x1="120" y1="170" x2="122" y2="190"/>
  </g>
  <!-- Upward arrows at shoulders -->
  <line x1="65" y1="65" x2="65" y2="45" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="60,48 65,38 70,48" fill="#4ecdc4"/>
  <line x1="135" y1="65" x2="135" y2="45" stroke="#4ecdc4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="130,48 135,38 140,48" fill="#4ecdc4"/>
</svg>
