<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StretchSmart Nudge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 24px;
  }
  .container {
    max-width: 440px; width: 100%;
    display: flex; flex-direction: column; align-items: center;
  }
  .eyebrow {
    font-size: 11px; color: #888; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  h1 {
    font-size: 30px; font-weight: 700; color: #e94560;
    text-align: center; margin-bottom: 6px; line-height: 1.2;
  }
  .duration-hint {
    font-size: 13px; color: #4ecdc4; margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .card {
    background: #16213e; border-radius: 20px; padding: 20px;
    width: 100%; margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .desc {
    font-size: 15px; line-height: 1.6; color: #ccc;
    text-align: center;
  }
  .start-btn {
    width: 100%; max-width: 360px;
    padding: 26px; border-radius: 32px;
    font-size: 22px; font-weight: 700;
    background: #e94560; color: white; border: none;
    cursor: pointer; transition: transform 0.1s;
    box-shadow: 0 6px 20px rgba(233,69,96,0.35);
    margin-bottom: 18px;
  }
  .start-btn:active { transform: scale(0.96); }
  .choosers {
    display: flex; gap: 8px; width: 100%;
  }
  .chooser {
    flex: 1; padding: 14px 6px;
    background: #2a2a4a; color: #aaa;
    border: 1px solid #3a3a5a; border-radius: 18px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .chooser:hover, .chooser.active {
    background: #1a3a5c; color: #6db3f2; border-color: #4ecdc4;
  }
  .timer-wrap {
    display: none; width: 100%; text-align: center;
  }
  .timer-wrap.show { display: block; }
  .timer-ring {
    width: 220px; height: 220px; position: relative;
    margin: 16px auto 8px;
  }
  .timer-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 52px; font-weight: 700; color: #fff;
  }
  .feedback {
    display: none; gap: 8px; width: 100%; margin-top: 8px;
  }
  .feedback.show { display: flex; }
  .fb-btn {
    flex: 1; padding: 14px;
    background: #2a2a4a; color: #e0e0e0;
    border: 1px solid #3a3a5a; border-radius: 18px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .fb-btn.easy { border-color: #4ecdc4; }
  .fb-btn.doable { border-color: #e9a045; }
  .fb-btn.couldnt { border-color: #e94560; }
  .fb-btn:active { transform: scale(0.96); }
  .done-msg {
    display: none; text-align: center; padding: 20px 0;
    color: #4ecdc4; font-size: 17px;
  }
  .done-msg.show { display: block; }
  .back-link {
    font-size: 12px; color: #888; text-decoration: none;
    margin-top: 28px;
  }
  .back-link:hover { color: #e94560; }
</style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">StretchSmart</div>
    <h1 id="ex-name">Loading…</h1>
    <div class="duration-hint" id="ex-duration"></div>

    <div class="card">
      <p class="desc" id="ex-desc">&nbsp;</p>
    </div>

    <div id="pre-start" style="width:100%;display:flex;flex-direction:column;align-items:center;">
      <button class="start-btn" id="start-btn" onclick="startTimer()">Let's Go</button>
      <div class="choosers" id="choosers">
        <button class="chooser" data-setting="seated" onclick="choose(this)">Seated</button>
        <button class="chooser" data-setting="standing" onclick="choose(this)">Standing</button>
        <button class="chooser" data-setting="full" onclick="choose(this)">Full Body</button>
      </div>
    </div>

    <div class="timer-wrap" id="timer-wrap">
      <div class="timer-ring">
        <svg width="220" height="220">
          <circle cx="110" cy="110" r="100" fill="none" stroke="#2a2a4a" stroke-width="8"/>
          <circle id="ring" cx="110" cy="110" r="100" fill="none" stroke="#e94560" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="628.3" stroke-dashoffset="0"
            style="transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 1s linear;"/>
        </svg>
        <div class="timer-text" id="timer-text">—</div>
      </div>
    </div>

    <div class="feedback" id="feedback">
      <button class="fb-btn easy" onclick="feedback('easy')">Easy</button>
      <button class="fb-btn doable" onclick="feedback('doable')">Doable</button>
      <button class="fb-btn couldnt" onclick="feedback('couldnt')">Couldn't</button>
    </div>

    <div class="done-msg" id="done-msg">
      ✓ Logged. Same exercise on your next nudge today.
    </div>

    <a class="back-link" href="/stretchsmart-prototype/">← Back to StretchSmart</a>
  </div>

<script>
let exercise = null;
let timerId = null;

async function loadExercise() {
  const params = new URLSearchParams(location.search);
  const exercises = await fetch('/stretchsmart-prototype/api/exercises.json').then(r => r.json());
  let idx = parseInt(params.get('e'));
  if (isNaN(idx) || idx < 0 || idx >= exercises.length) {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((now - start) / 86400000);
    idx = dayOfYear % exercises.length;
  }
  exercise = exercises[idx];
  document.getElementById('ex-name').textContent = exercise.name;
  document.getElementById('ex-duration').textContent = exercise.duration + ' seconds';
  document.getElementById('ex-desc').textContent = exercise.desc;
  document.getElementById('timer-text').textContent = exercise.duration;
}

function choose(btn) {
  document.querySelectorAll('.chooser').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // v1: choosers are UI acknowledgment only. Future: filter by setting metadata.
}

function startTimer() {
  document.getElementById('pre-start').style.display = 'none';
  document.getElementById('timer-wrap').classList.add('show');

  const totalDash = 628.3;
  const startTime = Date.now();
  const duration = exercise.duration;

  function tick() {
    const elapsed = (Date.now() - startTime) / 1000;
    const left = Math.max(0, Math.ceil(duration - elapsed));
    document.getElementById('timer-text').textContent = left;
    const frac = Math.min(1, elapsed / duration);
    document.getElementById('ring').style.strokeDashoffset = totalDash * frac;
    if (left <= 0) {
      clearInterval(timerId);
      document.getElementById('timer-wrap').classList.remove('show');
      document.getElementById('feedback').classList.add('show');
    }
  }
  tick();
  timerId = setInterval(tick, 250);
}

function feedback(val) {
  const log = JSON.parse(localStorage.getItem('ss_feedback') || '[]');
  log.push({ t: new Date().toISOString(), exercise: exercise.name, rating: val });
  localStorage.setItem('ss_feedback', JSON.stringify(log));
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('done-msg').classList.add('show');
}

loadExercise();
</script>
</body>
</html>
