<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StretchSmart Nudge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 24px;
  }
  .container {
    max-width: 440px; width: 100%;
    display: flex; flex-direction: column; align-items: center;
  }
  .eyebrow {
    font-size: 11px; color: #888; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  h1 {
    font-size: 28px; font-weight: 700; color: #e94560;
    text-align: center; margin-bottom: 6px; line-height: 1.2;
  }
  .duration-hint {
    font-size: 13px; color: #4ecdc4; margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .card {
    background: #16213e; border-radius: 20px; padding: 20px;
    width: 100%; margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .desc {
    font-size: 15px; line-height: 1.6; color: #ccc;
    text-align: center;
  }
  .start-btn {
    width: 100%; max-width: 360px;
    padding: 26px; border-radius: 32px;
    font-size: 22px; font-weight: 700;
    background: #e94560; color: white; border: none;
    cursor: pointer; transition: transform 0.1s;
    box-shadow: 0 6px 20px rgba(233,69,96,0.35);
    margin-bottom: 18px;
  }
  .start-btn:active { transform: scale(0.96); }
  .choosers {
    display: flex; gap: 8px; width: 100%;
  }
  .chooser {
    flex: 1; padding: 14px 6px;
    background: #2a2a4a; color: #aaa;
    border: 1px solid #3a3a5a; border-radius: 18px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    text-align: center;
  }
  .chooser:hover {
    background: #1a3a5c; color: #6db3f2; border-color: #4ecdc4;
  }
  .timer-wrap {
    display: none; width: 100%; text-align: center;
  }
  .timer-wrap.show { display: block; }
  .phase-label {
    font-size: 16px; font-weight: 600; color: #e9a045;
    margin-bottom: 8px; min-height: 24px;
  }
  .phase-progress {
    font-size: 11px; color: #888; margin-bottom: 4px;
  }
  .timer-ring {
    width: 200px; height: 200px; position: relative;
    margin: 8px auto;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px; font-weight: 700; color: #fff;
  }
  .total-remaining {
    font-size: 12px; color: #666; margin-top: 4px;
  }
  .feedback {
    display: none; gap: 8px; width: 100%; margin-top: 16px;
  }
  .feedback.show { display: flex; }
  .fb-btn {
    flex: 1; padding: 14px;
    background: #2a2a4a; color: #e0e0e0;
    border: 1px solid #3a3a5a; border-radius: 18px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .fb-btn.too-easy { border-color: #4ecdc4; }
  .fb-btn.doable { border-color: #e9a045; }
  .fb-btn.couldnt { border-color: #e94560; }
  .fb-btn:active { transform: scale(0.96); }
  .done-msg {
    display: none; text-align: center; padding: 20px 0;
    color: #4ecdc4; font-size: 17px;
  }
  .done-msg.show { display: block; }
  .back-link {
    font-size: 12px; color: #888; text-decoration: none;
    margin-top: 28px;
  }
  .hook {
    font-size: 15px; color: #ccc; font-style: italic;
    text-align: center; margin-bottom: 12px;
    line-height: 1.5; min-height: 22px;
  }
  .insight-card {
    display: none; background: #16213e; border-radius: 16px;
    padding: 18px; width: 100%; margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    border-left: 3px solid #4ecdc4;
  }
  .insight-card.show { display: block; }
  .insight-text {
    font-size: 14px; color: #ccc; line-height: 1.6;
    margin-bottom: 8px;
  }
  .insight-src {
    font-size: 11px; color: #888; font-style: italic;
  }
  .illustration {
    width: 160px; height: 160px;
    margin: 0 auto 16px;
  }
  .illustration img {
    width: 100%; height: 100%;
  }
  .back-link:hover { color: #e94560; }
</style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">StretchSmart</div>
    <p class="hook" id="hook"></p>
    <h1 id="ex-name">Loading…</h1>
    <div class="duration-hint" id="ex-duration"></div>

    <div class="illustration" id="ex-illust"></div>

    <div class="card">
      <p class="desc" id="ex-desc">&nbsp;</p>
    </div>

    <div id="pre-start" style="width:100%;display:flex;flex-direction:column;align-items:center;">
      <div class="insight-card" id="insight-card" style="margin-bottom:18px;">
        <p class="insight-text" id="insight-text"></p>
        <p class="insight-src" id="insight-src"></p>
      </div>
      <button class="start-btn" id="start-btn" onclick="startTimer()">Let's Go</button>
      <div class="choosers" id="choosers"></div>
    </div>

    <div class="timer-wrap" id="timer-wrap">
      <div class="phase-label" id="phase-label"></div>
      <div class="phase-progress" id="phase-progress"></div>
      <div class="timer-ring">
        <svg width="200" height="200">
          <circle cx="100" cy="100" r="90" fill="none" stroke="#2a2a4a" stroke-width="8"/>
          <circle id="ring" cx="100" cy="100" r="90" fill="none" stroke="#e94560" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="565.5" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timer-text">—</div>
      </div>
      <div class="total-remaining" id="total-remaining"></div>
    </div>

    <div class="feedback" id="feedback">
      <button class="fb-btn too-easy" onclick="submitFeedback('too-easy')">Too Easy</button>
      <button class="fb-btn doable" onclick="submitFeedback('doable')">Doable</button>
      <button class="fb-btn couldnt" onclick="submitFeedback('couldnt')">Couldn't</button>
    </div>

    <div class="done-msg" id="done-msg">
      ✓ Logged. Same exercise on your next nudge today.
    </div>

    <a class="back-link" href="/stretchsmart-prototype/">← Back to StretchSmart</a>
  </div>

<script>
const CIRC = 565.5; // 2 * pi * 90
let exercises = [];
let exercise = null;
let currentIdx = 0;
let timerId = null;
let audioCtx = null;

const POSITION_LABELS = {seated: 'Seated', standing: 'Standing', floor: 'Floor'};

const HOOKS = {
  morning: [
    "Your body's been waiting for this. Ready?",
    "Good morning to your muscles.",
    "You know what feels better than sitting? This.",
    "Start the day by showing up for yourself.",
  ],
  midday: [
    "Quick check-in with your body. Just a minute.",
    "Halfway through your day. Time to move.",
    "Your future self thanks you for this one.",
    "You've been great today. Keep the streak.",
  ],
  afternoon: [
    "One more today. This is the one that compounds.",
    "Almost done for the day. Let's close it out.",
    "You've already shown up. One more round.",
    "Last stretch of the day. Make it count.",
  ],
};

let insights = [];

function exerciseSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

function totalDuration(ex) {
  return (ex.phases || []).reduce((s, p) => s + (p.seconds || 0), 0);
}

async function loadExercise() {
  exercises = await fetch('/stretchsmart-prototype/api/exercises.json').then(r => r.json());
  const params = new URLSearchParams(location.search);
  let idx = parseInt(params.get('e'));
  if (isNaN(idx) || idx < 0 || idx >= exercises.length) {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    idx = Math.floor((now - start) / 86400000) % exercises.length;
  }
  currentIdx = idx;
  exercise = exercises[idx];

  document.getElementById('ex-name').textContent = exercise.name;
  document.getElementById('ex-duration').textContent = totalDuration(exercise) + ' seconds';
  document.getElementById('ex-desc').textContent = exercise.desc;

  const slug = exerciseSlug(exercise.name);
  const img = document.createElement('img');
  img.src = '/stretchsmart-prototype/img/exercises/' + slug + '.svg';
  img.alt = exercise.name;
  img.onerror = function() { this.style.display = 'none'; };
  document.getElementById('ex-illust').appendChild(img);

  // Hook text based on time of day
  const hr = new Date().getHours();
  const period = hr < 11 ? 'morning' : hr < 14 ? 'midday' : 'afternoon';
  const hookList = HOOKS[period];
  document.getElementById('hook').textContent = hookList[Math.floor(Math.random() * hookList.length)];

  // Load insights and show the one most relevant to THIS exercise as motivation before starting
  try {
    insights = await fetch('/stretchsmart-prototype/api/insights.json').then(r => r.json());
  } catch (e) { insights = []; }
  showRelevantInsight();

  buildChoosers();
}

function buildChoosers() {
  const container = document.getElementById('choosers');
  container.innerHTML = '';
  const pos = exercise.position;
  Object.keys(POSITION_LABELS).forEach(key => {
    if (key === pos) return;
    const alts = exercises.filter((e, i) => e.position === key && i !== currentIdx);
    if (!alts.length) return;
    const btn = document.createElement('button');
    btn.className = 'chooser';
    btn.textContent = 'Switch to ' + POSITION_LABELS[key];
    btn.onclick = () => switchTo(key);
    container.appendChild(btn);
  });
}

function switchTo(pos) {
  const alts = exercises
    .map((e, i) => ({e, i}))
    .filter(x => x.e.position === pos && x.i !== currentIdx);
  if (!alts.length) return;
  const pick = alts[Math.floor(Math.random() * alts.length)];
  const url = new URL(location);
  url.searchParams.set('e', pick.i);
  location.href = url;
}

function playDing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  } catch (e) {}
  try { navigator.vibrate(200); } catch (e) {}
}

function remainingFromPhase(phaseIdx, elapsedInPhase) {
  const phases = exercise.phases;
  let rem = Math.max(0, phases[phaseIdx].seconds - elapsedInPhase);
  for (let i = phaseIdx + 1; i < phases.length; i++) rem += phases[i].seconds;
  return Math.ceil(rem);
}

function startTimer() {
  // Unlock audio context on user gesture (mobile Safari)
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  document.getElementById('pre-start').style.display = 'none';
  document.getElementById('timer-wrap').classList.add('show');
  runPhase(0);
}

function runPhase(phaseIdx) {
  const phases = exercise.phases;
  if (phaseIdx >= phases.length) {
    document.getElementById('timer-wrap').classList.remove('show');
    document.getElementById('feedback').classList.add('show');
    playDing();
    return;
  }

  const phase = phases[phaseIdx];
  document.getElementById('phase-label').textContent = phase.label;
  document.getElementById('phase-progress').textContent =
    phases.length > 1 ? 'Step ' + (phaseIdx + 1) + ' of ' + phases.length : '';
  document.getElementById('timer-text').textContent = phase.seconds;
  document.getElementById('ring').style.transition = 'none';
  document.getElementById('ring').style.strokeDashoffset = '0';
  // Force reflow so transition reset takes effect
  void document.getElementById('ring').offsetWidth;
  document.getElementById('ring').style.transition = 'stroke-dashoffset 0.25s linear';

  const startTime = Date.now();

  function tick() {
    const elapsed = (Date.now() - startTime) / 1000;
    const left = Math.max(0, Math.ceil(phase.seconds - elapsed));
    document.getElementById('timer-text').textContent = left;
    const frac = Math.min(1, elapsed / phase.seconds);
    document.getElementById('ring').style.strokeDashoffset = (CIRC * frac).toFixed(1);
    document.getElementById('total-remaining').textContent =
      remainingFromPhase(phaseIdx, elapsed) + 's total remaining';

    if (left <= 0) {
      clearInterval(timerId);
      if (phaseIdx < phases.length - 1) {
        playDing();
        setTimeout(() => runPhase(phaseIdx + 1), 600);
      } else {
        runPhase(phaseIdx + 1);
      }
    }
  }
  tick();
  timerId = setInterval(tick, 200);
}

function showRelevantInsight() {
  if (!insights.length) return;
  const exTags = [...(exercise.concerns || []), ...(exercise.tags || [])].map(t => t.toLowerCase());
  let pick;
  if (exTags.length) {
    const scored = insights.map(ins => {
      const iTags = (ins.tags || []).map(t => t.toLowerCase());
      const overlap = iTags.filter(it =>
        exTags.some(et => et.includes(it) || it.includes(et))
      ).length;
      return {ins, score: overlap};
    });
    const maxScore = Math.max(...scored.map(s => s.score));
    const best = scored.filter(s => s.score === maxScore && s.score > 0);
    const pool = best.length ? best : scored;
    pick = pool[Math.floor(Math.random() * pool.length)].ins;
  } else {
    pick = insights[Math.floor(Math.random() * insights.length)];
  }
  document.getElementById('insight-text').textContent = pick.text;
  document.getElementById('insight-src').textContent = pick.source ? '— ' + pick.source : '';
  document.getElementById('insight-card').classList.add('show');
}

function submitFeedback(val) {
  const log = JSON.parse(localStorage.getItem('ss_feedback') || '[]');
  log.push({ t: new Date().toISOString(), exercise: exercise.name, rating: val });
  localStorage.setItem('ss_feedback', JSON.stringify(log));
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('done-msg').classList.add('show');
}

loadExercise();
</script>
</body>
</html>
